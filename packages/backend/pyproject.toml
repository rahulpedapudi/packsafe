[project]
name = "packsafe-backend"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "packsafe-core",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",
]

[tool.uv.sources]
packsafe-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]