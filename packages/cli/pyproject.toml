[project]
name = "packsafe-cli"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "packsafe-core",
    "typer>=0.12",
    "rich>=13.0",
]

[project.scripts]
packsafe = "packsafe_cli.main:app"

[tool.uv.sources]
packsafe-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["packsafe_cli"]